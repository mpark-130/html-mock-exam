<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <style>
    :root {
      --bg: #0b1220;
      --card: #111827;
      --card-soft: #0f172a;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --primary: #3b82f6;
      --wrong: #f87171;
      --right: #4ade80;
      --border: #374151;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      overflow-x: hidden;
    }

    .app-card {
      width: min(900px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
    }

    .hidden { display: none; }

    .home-title { font-size: 2rem; margin: 0 0 8px; }
    .home-sub { color: var(--muted); margin: 0 0 20px; }

    .home-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
    }

    .home-option {
      border: 1px solid var(--border);
      background: var(--card-soft);
      color: var(--text);
      border-radius: 12px;
      padding: 16px;
      text-align: left;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .home-option:hover { border-color: #60a5fa; background: #172036; }
    .home-option h3 { margin: 0 0 8px; font-size: 1.2rem; }
    .home-option p { margin: 0; color: var(--muted); line-height: 1.45; }

    .top-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 10px; }

    .small-btn, .next-btn {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.95rem;
      color: #fff;
      background: #334155;
      cursor: pointer;
    }

    .small-btn:hover { background: #475569; }

    .progress-wrap { margin-bottom: 14px; }
    .progress-header { display: flex; justify-content: space-between; align-items: center; gap: 8px; font-size: 0.92rem; color: var(--muted); margin-bottom: 6px; }
    .progress-track { width: 100%; height: 10px; background: #1f2937; border-radius: 999px; overflow: hidden; }
    .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #60a5fa, #2563eb); transition: width 0.2s ease; }

    .meta { font-size: 0.95rem; color: var(--muted); margin-bottom: 14px; }
    .question { font-size: 1.2rem; line-height: 1.45; font-weight: 700; margin-bottom: 18px; word-break: break-word; overflow-wrap: break-word; }
    .question-code { background: #0a0f1a; border: 1px solid #2d3748; border-left: 3px solid #3b82f6; border-radius: 8px; padding: 12px 14px; margin-top: 12px; font-size: 0.9rem; font-family: "Courier New", Courier, monospace; color: #7dd3fc; white-space: pre-wrap; font-weight: 400; line-height: 1.6; width: 100%; box-sizing: border-box; }
    .choices { display: grid; gap: 12px; }
    .choice-row { display: grid; gap: 6px; }
    .choice-btn { width: 100%; text-align: left; font-size: 1.02rem; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px; background: #0f172a; color: var(--text); cursor: pointer; transition: 0.18s ease; }
    .choice-btn:hover { border-color: #60a5fa; background: #172036; }
    .choice-btn.wrong { border-color: #7f1d1d; background: #3a1116; color: #fecaca; }
    .choice-btn.correct { border-color: #14532d; background: #0d2318; color: #bbf7d0; }

    .explanation-popup { display: none; width: 100%; background: #0f172a; border: 1px solid #14532d; border-left: 5px solid var(--right); border-radius: 10px; padding: 12px 14px; font-size: 0.96rem; line-height: 1.45; color: #bbf7d0; }

    .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; gap: 16px; flex-wrap: wrap; }
    .feedback { font-size: 1rem; color: var(--muted); min-height: 24px; margin: 0; }
    .next-btn { background: #64748b; cursor: not-allowed; }
    .next-btn.enabled { background: var(--primary); cursor: pointer; }

    .result { text-align: center; padding: 24px 8px 8px; }
    .result h2 { font-size: 2rem; margin-bottom: 10px; }

    .notes-title { margin: 0; font-size: 1.5rem; }
    .notes-subtitle { color: var(--muted); margin: 6px 0 16px; }
    .notes-list { display: grid; gap: 12px; max-height: 72vh; overflow-y: auto; padding-right: 4px; }
    .note-card { background: var(--card-soft); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
    .note-card h3 { margin: 0 0 10px; font-size: 1.08rem; text-transform: capitalize; }
    .note-card ul { margin: 0; padding-left: 18px; }
    .note-card li { margin-bottom: 6px; color: #d1d5db; line-height: 1.35; }

    @media (max-width: 900px) {
      body { padding: 12px; }
      .app-card { padding: 16px; }
      .question { font-size: 1.1rem; }

      .controls {

        padding: 12px;
      }

        font-size: 0.93rem;
      }
    }
  </style>

    // PDF reading functions
    async function loadQuizFromPDF() {
      try {
        const response = await fetch('final_mock_exam.pdf');
        if (!response.ok) {
          throw new Error('PDF file not found');
        }
        
        const arrayBuffer = await response.arrayBuffer();
        const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
        
        let fullText = '';
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const textContent = await page.getTextContent();
          const pageText = textContent.items.map(item => item.str).join(' ');
          fullText += pageText + '\n';
        }
        
        const parsedQuiz = parseQuizFromText(fullText);
        if (parsedQuiz.length > 0) {
          quizData = parsedQuiz;
          console.log('Successfully loaded quiz from PDF');
        }
      } catch (error) {
        console.error('Failed to load PDF, using fallback data:', error);
      }
    }

    function parseQuizFromText(text) {
      const questions = [];
      const lines = text.split('\n').filter(line => line.trim());
      
      let currentQuestion = null;
      let questionNumber = 1;
      
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        
        // Detect question start (looking for numbered questions or question patterns)
        if (line.match(/^(\d+\.|Question \d+|What|Which|How|When|Where|Why|True|False)/i)) {
          // Save previous question if exists
          if (currentQuestion && currentQuestion.question && currentQuestion.choices.length >= 2) {
            questions.push(currentQuestion);
          }
          
          // Start new question
          currentQuestion = {
            question: line.replace(/^\d+\.\s*/, '').replace(/^Question \d+:\s*/i, ''),
            choices: [],
            correctIndex: 0,
            reasoning: ''
          };
        }
        
        // Detect choices (A, B, C, D or numbered options)
        else if (currentQuestion && line.match(/^[A-D]\.|\d+\)/)) {
          const choice = line.replace(/^[A-D]\.\s*|\d+\)\s*/, '').trim();
          currentQuestion.choices.push(choice);
        }
        
        // Detect correct answer indicators
        else if (currentQuestion && line.match(/correct|answer/i)) {
          const match = line.match(/([A-D]|\d+)/);
          if (match) {
            const answer = match[1];
            if (answer.match(/[A-D]/)) {
              currentQuestion.correctIndex = answer.charCodeAt(0) - 65; // A=0, B=1, etc.
            } else {
              currentQuestion.correctIndex = parseInt(answer) - 1;
            }
          }
        }
        
        // Capture reasoning/explanation
        else if (currentQuestion && line.match(/reasoning|explanation|because/i)) {
          currentQuestion.reasoning = line.replace(/^(reasoning|explanation|because):?\s*/i, '').trim();
        }
      }
      
      // Add the last question
      if (currentQuestion && currentQuestion.question && currentQuestion.choices.length >= 2) {
        questions.push(currentQuestion);
      }
      
      return questions;
    }

    const homeSection = document.getElementById("homeSection");
    const mockExamSection = document.getElementById("mockExamSection");
    const reviewSection = document.getElementById("reviewSection");

    const openReview = document.getElementById("openReview");
    const openExam = document.getElementById("openExam");
    const resumeExam = document.getElementById("resumeExam");
    const backFromExam = document.getElementById("backFromExam");
    const backFromReview = document.getElementById("backFromReview");

    const questionCounter = document.getElementById("questionCounter");
    const questionText = document.getElementById("questionText");
    const choicesContainer = document.getElementById("choicesContainer");
    const feedbackText = document.getElementById("feedbackText");
    const nextButton = document.getElementById("nextButton");
    const resultSection = document.getElementById("resultSection");
    const quizSection = document.getElementById("quizSection");
    const scoreText = document.getElementById("scoreText");
    const restartButton = document.getElementById("restartButton");
    const progressFill = document.getElementById("progressFill");
    const progressLabel = document.getElementById("progressLabel");
    const progressPercent = document.getElementById("progressPercent");
    const notesContainer = document.getElementById("notesContainer");

    let currentQuestion = 0;
    let score = 0;
    let canAdvance = false;
    const EXAM_STATE_KEY = "mock_exam_state_v1";

    function saveExamState(completed = false) {
      const payload = {
        currentQuestion,
        score,
        completed
      };
      localStorage.setItem(EXAM_STATE_KEY, JSON.stringify(payload));
    }

    function loadExamState() {
      const raw = localStorage.getItem(EXAM_STATE_KEY);
      if (!raw) return null;
      try {
        const parsed = JSON.parse(raw);
        if (
          typeof parsed.currentQuestion !== "number" ||
          typeof parsed.score !== "number" ||
          parsed.currentQuestion < 0 ||
          parsed.currentQuestion > quizData.length
        ) {
          return null;
        }
        return parsed;
      } catch {
        return null;
      }
    }

    function updateResumeButton() {
      const state = loadExamState();
      if (!state || state.completed || state.currentQuestion >= quizData.length) {
        resumeExam.disabled = true;
        resumeExam.style.opacity = "0.55";
        resumeExam.style.cursor = "not-allowed";
        resumeExam.querySelector("p").textContent = "No saved progress yet. Start a new mock exam.";
        return;
      }
      resumeExam.disabled = false;
      resumeExam.style.opacity = "1";
      resumeExam.style.cursor = "pointer";
      resumeExam.querySelector("p").textContent =
        `Continue at question ${state.currentQuestion + 1} with score ${state.score}.`;
    }

    function showHome() {
      homeSection.classList.remove("hidden");
      mockExamSection.classList.add("hidden");
      reviewSection.classList.add("hidden");
      updateResumeButton();
    }

    function showMockExam(resume = false) {
      homeSection.classList.add("hidden");
      reviewSection.classList.add("hidden");
      mockExamSection.classList.remove("hidden");
      if (!resume) {
        startExam();
        return;
      }
      const state = loadExamState();
      if (!state || state.completed || state.currentQuestion >= quizData.length) {
        startExam();
        return;
      }
      currentQuestion = state.currentQuestion;
      score = state.score;
      canAdvance = false;
      resultSection.classList.add("hidden");
      quizSection.classList.remove("hidden");
      renderQuestion();
    }

    function showReview() {
      homeSection.classList.add("hidden");
      mockExamSection.classList.add("hidden");
      reviewSection.classList.remove("hidden");
      renderNotes();
    }

    function renderNotes() {
      if (notesContainer.dataset.loaded === "yes") return;
      notesContainer.innerHTML = "";
      notesData.forEach((section) => {
        const card = document.createElement("article");
        card.className = "note-card";

        const title = document.createElement("h3");
        title.textContent = section.title;

        const list = document.createElement("ul");
        section.bullets.forEach((bullet) => {
          const li = document.createElement("li");
          li.textContent = bullet;
          list.appendChild(li);
        });

        card.appendChild(title);
        card.appendChild(list);
        notesContainer.appendChild(card);
      });
      notesContainer.dataset.loaded = "yes";
    }

    function updateProgress() {
      const answeredCount = currentQuestion;
      const percent = Math.round((answeredCount / quizData.length) * 100);
      progressFill.style.width = `${percent}%`;
      progressLabel.textContent = `${answeredCount} of ${quizData.length} answered`;
      progressPercent.textContent = `${percent}%`;
    }

    function renderQuestion() {
      const item = quizData[currentQuestion];
      canAdvance = false;
      nextButton.disabled = true;
      nextButton.classList.remove("enabled");
      feedbackText.textContent = "";
      choicesContainer.innerHTML = "";

      questionCounter.textContent = `Question ${currentQuestion + 1} of ${quizData.length}`;
      // Render question text + optional code block
      questionText.innerHTML = "";
      const qTextNode = document.createElement("span");
      qTextNode.textContent = item.question;
      questionText.appendChild(qTextNode);
      if (item.code) {
        const pre = document.createElement("pre");
        pre.className = "question-code";
        const codeEl = document.createElement("code");
        codeEl.textContent = item.code;
        pre.appendChild(codeEl);
        questionText.appendChild(pre);
      }
      updateProgress();

      item.choices.forEach((choice, index) => {
        const row = document.createElement("div");
        row.className = "choice-row";

        const button = document.createElement("button");
        button.className = "choice-btn";
        button.textContent = choice;
        button.type = "button";

        const popup = document.createElement("div");
        popup.className = "explanation-popup";
        popup.textContent = item.reasoning;

        button.addEventListener("click", () => {
          if (canAdvance) return;

          const buttons = choicesContainer.querySelectorAll(".choice-btn");
          buttons.forEach((btn) => (btn.disabled = true));

          const correctRow = choicesContainer.children[item.correctIndex];
          const correctButton = correctRow.querySelector(".choice-btn");
          const correctPopup = correctRow.querySelector(".explanation-popup");
          correctButton.classList.add("correct");
          correctPopup.style.display = "block";

          if (index === item.correctIndex) {
            feedbackText.style.color = "var(--right)";
            feedbackText.textContent = "Correct. You can now move to the next question.";
            score += 1;
          } else {
            button.classList.add("wrong");
            feedbackText.style.color = "var(--wrong)";
            feedbackText.textContent = "Incorrect. Correct answer is highlighted. Click next to continue.";
          }

          canAdvance = true;
          nextButton.disabled = false;
          nextButton.classList.add("enabled");
        });

        row.appendChild(button);
        row.appendChild(popup);
        choicesContainer.appendChild(row);
      });
      saveExamState(false);
    }

    function startExam() {
      currentQuestion = 0;
      score = 0;
      canAdvance = false;
      resultSection.classList.add("hidden");
      quizSection.classList.remove("hidden");
      saveExamState(false);
      renderQuestion();
    }

    nextButton.addEventListener("click", () => {
      if (!canAdvance) return;

      currentQuestion += 1;
      if (currentQuestion >= quizData.length) {
        quizSection.classList.add("hidden");
        resultSection.classList.remove("hidden");
        progressFill.style.width = "100%";
        progressLabel.textContent = `${quizData.length} of ${quizData.length} answered`;
        progressPercent.textContent = "100%";
        scoreText.textContent = `Your final score: ${score} / ${quizData.length}`;
        saveExamState(true);
      } else {
        saveExamState(false);
        renderQuestion();
      }
    });

    restartButton.addEventListener("click", startExam);
    openExam.addEventListener("click", () => showMockExam(false));
    resumeExam.addEventListener("click", () => showMockExam(true));
    openReview.addEventListener("click", showReview);
    backFromExam.addEventListener("click", showHome);
    backFromReview.addEventListener("click", showHome);

    // Initialize the app
    async function initializeApp() {
      await loadQuizFromPDF();
      showHome();
    }

    initializeApp();
  </script>
