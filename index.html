<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Mock Exam</title>
  <style>
    :root {
      --bg: #0b1220;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --primary: #3b82f6;
      --wrong: #f87171;
      --right: #4ade80;
      --border: #374151;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      overflow-x: hidden;
    }

    .quiz-card {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
    }

    .progress-wrap {
      margin-bottom: 14px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 0.92rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .progress-track {
      width: 100%;
      height: 10px;
      background: #1f2937;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #60a5fa, #2563eb);
      transition: width 0.2s ease;
    }

    .meta {
      font-size: 0.95rem;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .question {
      font-size: 1.55rem;
      line-height: 1.35;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .choices {
      display: grid;
      gap: 12px;
    }

    .choice-row {
      display: grid;
      gap: 6px;
    }

    .choice-btn {
      width: 100%;
      text-align: left;
      font-size: 1.05rem;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #0f172a;
      color: var(--text);
      cursor: pointer;
      transition: 0.18s ease;
    }

    .choice-btn:hover {
      border-color: #60a5fa;
      background: #172036;
    }

    .choice-btn.wrong {
      border-color: #7f1d1d;
      background: #3a1116;
      color: #fecaca;
    }

    .choice-btn.correct {
      border-color: #14532d;
      background: #0d2318;
      color: #bbf7d0;
    }

    .explanation-popup {
      display: none;
      width: 100%;
      background: #0f172a;
      border: 1px solid #14532d;
      border-left: 5px solid var(--right);
      border-radius: 10px;
      padding: 12px 14px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
      font-size: 0.98rem;
      line-height: 1.45;
      color: #bbf7d0;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 24px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .feedback {
      font-size: 1rem;
      color: var(--muted);
      min-height: 24px;
    }

    .next-btn {
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 1rem;
      color: #fff;
      background: #94a3b8;
      cursor: not-allowed;
      transition: 0.18s ease;
    }

    .next-btn.enabled {
      background: var(--primary);
      cursor: pointer;
    }

    .hidden {
      display: none;
    }

    .result {
      text-align: center;
      padding: 24px 8px 8px;
    }

    .result h2 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    @media (max-width: 900px) {
      body {
        padding: 12px;
      }

      .quiz-card {
        padding: 16px;
      }

      .question {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <main class="quiz-card">
    <div class="progress-wrap">
      <div class="progress-header">
        <span id="progressLabel">Progress</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-track" aria-hidden="true">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
    <div class="meta" id="questionCounter"></div>
    <section id="quizSection">
      <div class="question" id="questionText"></div>
      <div class="choices" id="choicesContainer"></div>
      <div class="controls">
        <p class="feedback" id="feedbackText"></p>
        <button class="next-btn" id="nextButton" disabled>Next Question</button>
      </div>
    </section>

    <section class="result hidden" id="resultSection">
      <h2>Quiz Complete</h2>
      <p id="scoreText"></p>
      <button class="next-btn enabled" id="restartButton" type="button">Restart Quiz</button>
    </section>
  </main>

  <script>

      {

      {

      {

      {

      {

      {

      {

      {

        "choices": ["Extra variables", "Equal variance", "Expected value", "Extrapolation"],

      {

        "choices": ["A statistically significant coefficient always proves causation", "Regression can safely predict far outside the observed data range", "Outliers can strongly distort a regression line", "Regression does not require a research question"],

    const questionCounter = document.getElementById("questionCounter");
    const questionText = document.getElementById("questionText");
    const choicesContainer = document.getElementById("choicesContainer");
    const feedbackText = document.getElementById("feedbackText");
    const nextButton = document.getElementById("nextButton");
    const resultSection = document.getElementById("resultSection");
    const quizSection = document.getElementById("quizSection");
    const scoreText = document.getElementById("scoreText");
    const restartButton = document.getElementById("restartButton");
    const progressFill = document.getElementById("progressFill");
    const progressLabel = document.getElementById("progressLabel");
    const progressPercent = document.getElementById("progressPercent");

    let currentQuestion = 0;
    let score = 0;
    let canAdvance = false;

    function updateProgress() {
      const answeredCount = currentQuestion;
      const percent = Math.round((answeredCount / quizData.length) * 100);
      progressFill.style.width = `${percent}%`;
      progressLabel.textContent = `${answeredCount} of ${quizData.length} answered`;
      progressPercent.textContent = `${percent}%`;
    }

    function renderQuestion() {
      const item = quizData[currentQuestion];
      canAdvance = false;
      nextButton.disabled = true;
      nextButton.classList.remove("enabled");
      feedbackText.textContent = "";
      choicesContainer.innerHTML = "";

      questionCounter.textContent = `Question ${currentQuestion + 1} of ${quizData.length}`;
      questionText.textContent = item.question;
      updateProgress();

      item.choices.forEach((choice, index) => {
        const row = document.createElement("div");
        row.className = "choice-row";

        const button = document.createElement("button");
        button.className = "choice-btn";
        button.textContent = choice;
        button.type = "button";

        const popup = document.createElement("div");
        popup.className = "explanation-popup";
        popup.textContent = item.reasoning;

        button.addEventListener("click", () => {
          if (canAdvance) {
            return;
          }

          const buttons = choicesContainer.querySelectorAll(".choice-btn");
          buttons.forEach((btn) => {
            btn.disabled = true;
          });

          const correctRow = choicesContainer.children[item.correctIndex];
          const correctButton = correctRow.querySelector(".choice-btn");
          const correctPopup = correctRow.querySelector(".explanation-popup");
          correctButton.classList.add("correct");
          correctPopup.style.display = "block";

          if (index === item.correctIndex) {
            feedbackText.style.color = "var(--right)";
            feedbackText.textContent = "Correct. You can now move to the next question.";
            score += 1;
          } else {
            button.classList.add("wrong");
            feedbackText.style.color = "var(--wrong)";
            feedbackText.textContent = "Incorrect. Correct answer is highlighted. Click next to continue.";
          }

          canAdvance = true;
          nextButton.disabled = false;
          nextButton.classList.add("enabled");
        });

        row.appendChild(button);
        row.appendChild(popup);
        choicesContainer.appendChild(row);
      });
    }

    nextButton.addEventListener("click", () => {
      if (!canAdvance) {
        return;
      }

      currentQuestion += 1;

      if (currentQuestion >= quizData.length) {
        quizSection.classList.add("hidden");
        resultSection.classList.remove("hidden");
        progressFill.style.width = "100%";
        progressLabel.textContent = `${quizData.length} of ${quizData.length} answered`;
        progressPercent.textContent = "100%";
        scoreText.textContent = `Your final score: ${score} / ${quizData.length}`;
      } else {
        renderQuestion();
      }
    });

    restartButton.addEventListener("click", () => {
      currentQuestion = 0;
      score = 0;
      canAdvance = false;
      resultSection.classList.add("hidden");
      quizSection.classList.remove("hidden");
      renderQuestion();
    });

    renderQuestion();
  </script>
</body>
</html>
